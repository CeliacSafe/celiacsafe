name: Security Audit

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1'

jobs:
  npm-audit:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - name: app
            directory: .
          - name: admin-web
            directory: admin-web
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ${{ matrix.directory == '.' && 'package-lock.json' || 'admin-web/package-lock.json' }}

      - name: Install dependencies (${{ matrix.name }})
        working-directory: ${{ matrix.directory }}
        run: npm ci

      - name: npm audit (${{ matrix.name }})
        working-directory: ${{ matrix.directory }}
        run: npm audit --audit-level=high

  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
